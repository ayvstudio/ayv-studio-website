<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayv Studio</title>
<style>
  :root {
    --bg: #f4f3f1;
    --ink: #2b2b2b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background-image: url('assets/paper.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: scroll;
  }

  @media (min-width: 701px) {
    body { background-attachment: fixed; }
  }

  .stage {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 5vw;
  }

  .composition {
    position: relative;
    width: 100%;
    max-width: 1100px;
    aspect-ratio: 16 / 10;
  }

  /* Nav row */
  .nav {
    position: absolute;
    top: -8%;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2%;
    z-index: 10;
  }

  .nav a {
    display: block;
    height: 104px;
    opacity: 0.85;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .nav a:hover {
    opacity: 1;
    transform: translateY(-2px);
  }

  .nav img {
    height: 100%;
    width: auto;
    display: block;
  }

  .nav a img { height: 96px; }

  /* Lace + flowers centerpiece */
  .centerpiece {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: min(58%, 520px);
  }

  .lace-wrap {
    position: relative;
    width: 100%;
  }

  .lace {
    width: 100%;
    display: block;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 18px 30px rgba(0,0,0,0.06));
  }

  .flower {
    position: absolute;
    top: 4%;
    left: -16%;
    width: 32%;
    z-index: 2;
    pointer-events: none;
  }

  .studio-title {
    position: absolute;
    top: 41%;
    left: 50%;
    transform: translateX(-50%);
    width: 62%;
    max-width: 460px;
    z-index: 3;
    pointer-events: none;
  }

  .stamp {
    position: absolute;
    bottom: 4%;
    right: -10%;
    width: 26%;
    z-index: 4;
    transform: rotate(26deg);
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.12));
    pointer-events: none;
  }

  /* Tagline */
  .tagline {
    position: absolute;
    bottom: -10%;
    left: 46%;
    transform: translateX(-50%);
    text-align: center;
  }

  .tagline img {
    height: 72px;
    width: auto;
    display: block;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .composition { aspect-ratio: 9 / 16; min-height: 100vh; }

    .nav {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px 12px;
      padding: 24px 6%;
      justify-content: center;
      justify-items: center;
      top: 0;
    }
    .nav a img { height: 38px; }

    .centerpiece { position: relative; top: 8%; width: 88%; margin: 0 auto; }
    .flower { width: 36%; top: 2%; left: -14%; }
    .studio-title { top: 43%; width: 80%; }
    .stamp { width: 30%; bottom: 6%; }
    .tagline img { height: 38px; }
    .tagline { position: relative; bottom: 0; margin-top: 36px; left: 50%; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="composition">

    <nav class="nav">
      <a href="about.html" aria-label="About"><img src="assets/about.png" alt="About"></a>
      <a href="gallery.html" aria-label="Gallery"><img src="assets/gallery.png" alt="Gallery"></a>
      <a href="services.html" aria-label="Services"><img src="assets/services.png" alt="Services"></a>
      <a href="contact.html" aria-label="Contact"><img src="assets/contact.png" alt="Contact"></a>
      <a href="love-notes.html" aria-label="Love Notes"><img src="assets/love_notes.png" alt="Love Notes"></a>
    </nav>

    <div class="centerpiece">
      <div class="lace-wrap">
        <img class="flower" src="assets/flower2.png" alt="">
        <img class="lace" src="assets/lace.png" alt="Ayv Studio lace">
        <img class="studio-title" src="assets/ayv_studio.png" alt="Ayv Studio">
        <img class="stamp" src="assets/stamp.png" alt="">
      </div>
      <div class="tagline">
        <img src="assets/tagline.png" alt="For better, for worse, and for everything in between.">
      </div>
    </div>

  </div>
</div>

</body>
</html>
